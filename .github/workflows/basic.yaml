name: CI/CD Pipeline
run-name: ${{ github.actor }} is deploying the cdk
on:
  push: 
    branches: [main]
    # workflow dispatch allows us to manually trigger Github actions workflows
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BAKEHOUSE_STACK_NAME: ruona-okungbowa-bakehouse
  AWS_REGION: eu-west-2


jobs:

  # ----------- Job 1: Always runs first, so install all the dependencies --------
  install-dependencies:
    name: Install dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Make the script executable
        run: chmod +x install.sh 
      - name: Run the install script
        run: ./install.sh

# ------- Job 2: (for now its lint & static analysis but may change later) ----------
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - uses: actions/checkout@v4
      - name: Run linter
        run: echo "Running lint checks"
      - name: Run static analysis
        run: echo "Running static analysis"

  # -------- Job 3: Do the unit tests --------------------------

  # -------- Job 4: Configure AWS ------------------
  configure-aws:
    name: Configure and Verify AWS
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN}}
          # Session name now includes:
          # gha-cdk-{student}-{run_id}-{attempt}
          # Example: gha-cdk-alice-1234567890-1
          role-session-name: ${{ needs.setup.outputs.session-name }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify OIDC credentials
        run: |
            echo "Verifying AWS credentials..."
            IDENTITY=$(aws sts get-caller-identity)
            echo "Assumed role:"
            echo "${IDENTITY}" | jq '.'
            ROLE_SESSION=$(echo "${IDENTITY}" | jq -r '.Arn' | grep -oP '(?<=/)[^/]+$')
            echo "Current session: ${ROLE_SESSION}"
      - name: Check AWS identity
        run: aws sts get-caller-identity
  # ------- Job 5: Synth the Stack -------------
  synth-stack:
    name: Synthesize the Stack
    needs: configure-aws
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Synth CDK stack
        run: npx cdk synth 
  # ------- Job 6: Deploy the Stack ------------
  deploy-stack:
    name: Deploy the Stack
    needs: synth-stack
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy the CDK stack
        run: npx cdk deploy --all --require-approval never
  # -------- Job 7: Playwright Tests --------------------------
  # -------- Job 8: Run Mini K6 Test --------------------------